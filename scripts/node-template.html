<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <!-- Primary Meta Tags -->
    <title>{{NAME}} | Cigar Nexus</title>
    <meta name="title" content="{{NAME}} | Cigar Nexus">
    <meta name="description" content="{{DESCRIPTION}} | Explore the connections of {{NAME}} in the premium cigar industry.">
    <meta name="theme-color" content="#5c2e2e">
    <meta name="author" content="Cigar Nexus">

    <!-- Favicons & Icons -->
    <link rel="icon" type="image/png" href="../../favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="shortcut icon" href="../../favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../../apple-touch-icon.png" />
    <link rel="manifest" href="../../site.webmanifest" />

    <!-- Scripts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../styles.css">

    <style>
      .node-page { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
      .node-header { margin-bottom: 2rem; }
      .node-meta { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
      .node-meta span { background: #f4e9d8; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; }
      .node-connections, .product-lines { list-style: none; padding: 0; }
      .node-connections li { margin: 0.5rem 0; padding: 0.5rem; background: #f8f5f0; border-radius: 8px; }
      .back-link { display: inline-block; margin-top: 2rem; color: #c5a26f; text-decoration: underline; }
    </style>
</head>
<body class="bg-[#f8f5f0] text-[#3f2a2a]">
  <header class="site-header bg-[#5c2e2e] text-white shadow-lg">
    <div class="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-x-3.5">
        <!-- Premium logo -->
        <div class="w-8 h-8 bg-gradient-to-br from-[#c5a26f] to-[#d4b17e] rounded-full flex items-center justify-center shadow-inner ring-1 ring-white/30">
          <span class="text-[#5c2e2e] text-lg font-bold tracking-[-1px]">CN</span>
        </div>
        <a href="/" class="font-semibold text-2xl tracking-[-0.5px] flex items-baseline gap-1">Cigar Nexus</a>
      </div>
      <div class="flex items-center gap-x-1 text-xs sm:text-sm">
        <a href="/" class="nav-link px-3 py-1.5 hover:bg-white/10 rounded-2xl text-[#e8d9c3] transition-colors">Map</a>
        <a href="/about.html" class="px-3 py-1.5 hover:bg-white/10 rounded-2xl text-[#e8d9c3] transition-colors">About</a>
      </div>
    </div>
  </header>
  <main class="node-page">
    <div class="node-header">
      <h1 class="text-4xl font-semibold tracking-tight">{{NAME}}</h1>
      <div class="node-meta">
        <span>{{TYPE}}</span>
        <span>{{COUNTRY}}</span>
      </div>
    </div>
    <div class="prose max-w-none text-[#5c4638]">
      <p>{{DESCRIPTION}}</p>
    </div>
    <div class="mt-8">
      <h2 class="text-2xl font-semibold mb-4">Connections</h2>
      {{CONNECTIONS}}
    </div>
    {{PRODUCT_LINES}}
    <a href="{{BACK_TO_MAP}}" class="back-link">← Explore this node on the interactive map</a>
  </main>
  <footer class="mt-16 py-8 border-t border-[#d4c4a8] text-center text-sm text-[#8b6f5c]">
    <p>&copy; Cigar Nexus — Interactive map of the premium cigar industry.</p>
  </footer>
</body>
</html>
