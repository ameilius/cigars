name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify SEO page build (CI gate)
        run: |
          node scripts/generate-node-pages.js
          test -f node/padron/index.html
          grep -q "Industry Connections" node/padron/index.html
          echo "Build OK: $(find node -name index.html | wc -l) pages"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            git fetch --all
            git reset --hard origin/main
            echo "Building SEO node pages from tracked source files..."
            NODE_BIN=$(command -v node || echo /usr/bin/node)
            $NODE_BIN scripts/generate-node-pages.js
            COUNT=$(find node -name index.html | wc -l)
            echo "Deployed $COUNT node pages"
            test "$COUNT" -ge 100
            grep -q "Industry Connections" node/padron/index.html
            echo "Deploy verified successfully at $(date)"