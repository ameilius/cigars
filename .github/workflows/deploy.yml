name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build SEO node pages (CI gate)
        run: |
          node scripts/generate-node-pages.js
          test -f node/padron/index.html
          grep -q "Industry Connections" node/padron/index.html
          echo "Build OK: $(find node -name index.html | wc -l) pages"

      - name: Sync source code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eo pipefail
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            git fetch --all
            git reset --hard origin/main
            echo "Git sync complete"

      - name: Stream generated pages to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          tar czf - node sitemap.xml | ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            cigarnexus@13.140.140.201 \
            'set -eo pipefail
             cd /home/cigarnexus/web/cigarnexus.app/public_html
             rm -rf node
             tar xzf -
             COUNT=$(find node -name index.html | wc -l | tr -d " ")
             echo "Streamed $COUNT node pages"
             test "$COUNT" -ge 100
             grep -q "Industry Connections" node/padron/index.html
             echo "Deploy verified successfully at $(date)"'