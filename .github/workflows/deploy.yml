name: Deploy to Server

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify SEO page build (CI gate)
        run: |
          node scripts/generate-node-pages.js
          test -f node/padron/index.html
          test "$(wc -c < node/padron/index.html)" -gt 12000
          grep -q "Industry Connections" node/padron/index.html
          test -f sitemap.xml
          NODE_COUNT=$(node -e "const vm=require('vm');const fs=require('fs');const s={};vm.createContext(s);vm.runInContext(fs.readFileSync('data.js','utf8'),s);console.log(s.baseGraphData.nodes.length)")
          SITEMAP_NODES=$(grep -c 'cigarnexus.app/node/' sitemap.xml)
          test "$SITEMAP_NODES" -eq "$NODE_COUNT"
          grep -q '<loc>https://cigarnexus.app/node/padron/</loc>' sitemap.xml
          echo "CI build OK: $(find node -name index.html | wc -l) pages, sitemap $SITEMAP_NODES node URLs"

      - name: Deploy on VPS (git pull + generate)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            echo "Deploy user: $(whoami)"
            git fetch --all
            git reset --hard origin/main
            echo "Synced: $(git log -1 --oneline)"
            if [ -d node ] && [ ! -w node ]; then
              echo "ERROR: node/ is not writable by $(whoami) (likely root-owned from a manual run)."
              echo "Fix once as root: chown -R cigarnexus:cigarnexus $(pwd)/node $(pwd)/sitemap.xml"
              exit 1
            fi
            if [ -f sitemap.xml ] && [ ! -w sitemap.xml ]; then
              echo "ERROR: sitemap.xml is not writable by $(whoami)."
              echo "Fix once as root: chown cigarnexus:cigarnexus $(pwd)/sitemap.xml"
              exit 1
            fi
            NODE_BIN=/usr/bin/node
            if ! [ -x "$NODE_BIN" ]; then NODE_BIN=$(command -v node); fi
            echo "Node: $NODE_BIN ($($NODE_BIN --version 2>&1 || echo MISSING))"
            $NODE_BIN scripts/generate-node-pages.js
            SIZE=$(wc -c < node/padron/index.html | tr -d ' ')
            COUNT=$(find node -name index.html | wc -l | tr -d ' ')
            echo "Generated $COUNT pages, padron=$SIZE bytes at $(stat -c %y node/padron/index.html 2>/dev/null || stat -f %Sm node/padron/index.html)"
            test "$SIZE" -gt 12000
            grep -q "Industry Connections" node/padron/index.html
            test -f sitemap.xml
            NODE_COUNT=$($NODE_BIN -e "const vm=require('vm');const fs=require('fs');const s={};vm.createContext(s);vm.runInContext(fs.readFileSync('data.js','utf8'),s);console.log(s.baseGraphData.nodes.length)")
            SITEMAP_NODES=$(grep -c 'cigarnexus.app/node/' sitemap.xml)
            test "$SITEMAP_NODES" -eq "$NODE_COUNT"
            grep -q '<loc>https://cigarnexus.app/node/padron/</loc>' sitemap.xml
            echo "Sitemap OK: $SITEMAP_NODES node URLs"
            date -u +%Y-%m-%dT%H:%M:%SZ > deploy-stamp.txt

      - name: Verify live site
        run: |
          sleep 5
          curl -fsS "https://cigarnexus.app/deploy-stamp.txt"
          BODY=$(curl -fsS "https://cigarnexus.app/node/padron/")
          echo "$BODY" | grep -q "Industry Connections"
          echo "$BODY" | grep -q 'rel="canonical"'
          node -e "
            const https = require('https');
            const vm = require('vm');
            const get = (url) => new Promise((resolve, reject) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
            (async () => {
              const [dataJs, sitemap] = await Promise.all([
                get('https://cigarnexus.app/data.js'),
                get('https://cigarnexus.app/sitemap.xml')
              ]);
              const sandbox = {};
              vm.createContext(sandbox);
              vm.runInContext(dataJs, sandbox);
              const expected = sandbox.baseGraphData.nodes.length;
              const ids = new Set(sandbox.baseGraphData.nodes.map((n) => n.id));
              const found = [...sitemap.matchAll(/<loc>https:\\/\\/cigarnexus\\.app\\/node\\/([^/]+)\\//g)].map((m) => m[1]);
              if (found.length !== expected) {
                console.error('Live sitemap node count', found.length, '!= data.js', expected);
                process.exit(1);
              }
              for (const id of found) {
                if (!ids.has(id)) {
                  console.error('Live sitemap has stale URL:', id);
                  process.exit(1);
                }
              }
              for (const id of ids) {
                if (!found.includes(id)) {
                  console.error('Live sitemap missing URL:', id);
                  process.exit(1);
                }
              }
              console.log('Live sitemap OK:', expected, 'node URLs');
            })().catch((err) => {
              console.error(err);
              process.exit(1);
            });
          "
          echo "Live site OK"