name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build SEO node pages (CI gate)
        run: |
          node scripts/generate-node-pages.js
          test -f node/padron/index.html
          grep -q "Industry Connections" node/padron/index.html
          cp -r node node-pages
          echo "Build OK: $(find node -name index.html | wc -l) pages"

      - name: Sync source code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            git fetch --all
            git reset --hard origin/main
            rm -rf node node-pages
            echo "Git sync complete"

      - name: Upload generated pages
        uses: appleboy/scp-action@v1.0.0
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "node-pages,sitemap.xml"
          target: /home/cigarnexus/web/cigarnexus.app/public_html
          overwrite: true
          command_timeout: 10m

      - name: Finalize and verify on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            rm -rf node
            if [ -d node-pages/node-pages ]; then
              mv node-pages/node-pages node
              rm -rf node-pages
            elif [ -d node-pages ]; then
              mv node-pages node
            elif [ -f padron/index.html ]; then
              mkdir node
              for dir in */; do
                case "$dir" in
                  node-pages/|node/|logos/|scripts/) continue ;;
                esac
                [ -f "${dir}index.html" ] && mv "$dir" "node/${dir}"
              done
            else
              echo "ERROR: uploaded pages not found"
              ls -la
              find . -maxdepth 2 -path '*/padron/index.html' 2>/dev/null || true
              exit 1
            fi
            PADRON_PAGE=$(find . -path '*/padron/index.html' 2>/dev/null | head -1)
            if [ -z "$PADRON_PAGE" ]; then
              echo "ERROR: padron/index.html not found after upload"
              exit 1
            fi
            COUNT=$(find node -name index.html 2>/dev/null | wc -l | tr -d ' ')
            echo "Deployed $COUNT node pages (padron at $PADRON_PAGE)"
            if [ "$COUNT" -lt 100 ]; then
              echo "ERROR: expected at least 100 pages"
              exit 1
            fi
            if ! grep -q "Industry Connections" "$PADRON_PAGE"; then
              echo "ERROR: padron page missing new SEO template"
              exit 1
            fi
            echo "Deploy verified successfully at $(date)"