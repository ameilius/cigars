name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build SEO node pages (CI gate)
        run: |
          node scripts/generate-node-pages.js
          test -f node/padron/index.html
          grep -q "Industry Connections" node/padron/index.html
          echo "Build OK: $(find node -name index.html | wc -l) pages"

      - name: Package generated pages
        run: tar czf generated-pages.tgz node sitemap.xml

      - name: Sync source code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eo pipefail
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            git fetch --all
            git reset --hard origin/main
            echo "Git sync complete"

      - name: Upload generated pages archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: generated-pages.tgz
          target: /tmp/
          overwrite: true

      - name: Install generated pages on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eo pipefail
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            rm -rf node

            ARCHIVE=""
            for candidate in /tmp/generated-pages.tgz /tmp/generated-pages.tgz/generated-pages.tgz; do
              if [ -f "$candidate" ]; then
                ARCHIVE="$candidate"
                break
              fi
            done
            if [ -z "$ARCHIVE" ]; then
              ARCHIVE=$(find /tmp -maxdepth 3 -name 'generated-pages.tgz' -type f 2>/dev/null | head -1 || true)
            fi

            if [ -n "$ARCHIVE" ] && [ -f "$ARCHIVE" ]; then
              echo "Extracting archive: $ARCHIVE"
              tar xzf "$ARCHIVE" -C .
              rm -rf /tmp/generated-pages.tgz 2>/dev/null || true
            else
              echo "Archive not found — building on VPS"
              NODE_BIN=$(command -v node 2>/dev/null || true)
              if [ -z "$NODE_BIN" ] && [ -x /usr/bin/node ]; then NODE_BIN=/usr/bin/node; fi
              if [ -z "$NODE_BIN" ] && [ -x /usr/local/bin/node ]; then NODE_BIN=/usr/local/bin/node; fi
              if [ -z "$NODE_BIN" ]; then
                echo "ERROR: node not found on VPS"
                exit 1
              fi
              echo "Using $NODE_BIN ($($NODE_BIN --version))"
              $NODE_BIN scripts/generate-node-pages.js
            fi

            if [ ! -d node ]; then
              echo "ERROR: node/ directory missing after deploy"
              exit 1
            fi
            COUNT=$(find node -name index.html | wc -l | tr -d ' ')
            echo "Deployed $COUNT node pages"
            test "$COUNT" -ge 100
            grep -q "Industry Connections" node/padron/index.html
            echo "Deploy verified successfully at $(date)"