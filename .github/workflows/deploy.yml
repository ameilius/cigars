name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Contabo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            git fetch --all
            git reset --hard origin/main
            echo "Running generator to build /node/ pages (long content) + update sitemap..."
            if command -v node >/dev/null 2>&1; then
              node scripts/generate-node-pages.js
            else
              /usr/bin/node scripts/generate-node-pages.js
            fi
            echo "SEO node pages generated successfully."
            echo "Deployment completed at $(date)"
