name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying cigarnexus.app..."
            cd /var/www/cigarnexus || { echo "Directory not found"; exit 1; }
            git fetch origin
            git reset --hard origin/main
            # Optional: fix permissions if needed
            # sudo chown -R www-data:www-data .
            # sudo chmod -R 755 .
            echo "Deployment finished. Restarting web server if needed..."
            # sudo systemctl reload nginx   # uncomment if using nginx
            echo "Done."
