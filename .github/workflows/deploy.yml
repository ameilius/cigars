name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Contabo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.140.140.201
          username: cigarnexus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/cigarnexus/web/cigarnexus.app/public_html
            git fetch --all
            git reset --hard origin/main
            echo "Building SEO node pages from data.js + descriptions.js + expanded-descriptions.js..."
            NODE_BIN=$(command -v node || echo /usr/bin/node)
            $NODE_BIN scripts/generate-node-pages.js
            echo "Done. $(find node -name index.html 2>/dev/null | wc -l) node pages + sitemap.xml"
            echo "Deployment completed at $(date)"
